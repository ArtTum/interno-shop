<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" width="400" height="300">
  <rect width="400" height="300" fill="#f0f2f5"/>
  <defs>
    <radialGradient id="reelGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8e0d0"/>
      <stop offset="60%" stop-color="#d0c8b0"/>
      <stop offset="100%" stop-color="#b8b0a0"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fff8e0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow effect -->
  <circle cx="200" cy="148" r="90" fill="url(#glowGrad)"/>
  <!-- Reel shadow -->
  <ellipse cx="203" cy="155" rx="72" ry="72" fill="#c0b898" opacity="0.3"/>
  <!-- Reel outer ring -->
  <circle cx="200" cy="148" r="72" fill="url(#reelGrad)" stroke="#c0b898" stroke-width="2"/>
  <!-- LED strip wound around reel — concentric rings with warm color -->
  <circle cx="200" cy="148" r="68" fill="none" stroke="#ffcc44" stroke-width="4" opacity="0.8"/>
  <circle cx="200" cy="148" r="60" fill="none" stroke="#ffd455" stroke-width="3.5" opacity="0.75"/>
  <circle cx="200" cy="148" r="52" fill="none" stroke="#ffcc44" stroke-width="3" opacity="0.7"/>
  <circle cx="200" cy="148" r="44" fill="none" stroke="#ffd455" stroke-width="3" opacity="0.65"/>
  <circle cx="200" cy="148" r="36" fill="none" stroke="#ffcc44" stroke-width="2.5" opacity="0.6"/>
  <!-- Reel hub -->
  <circle cx="200" cy="148" r="22" fill="#d8d0b8" stroke="#b8b0a0" stroke-width="1.5"/>
  <circle cx="200" cy="148" r="10" fill="#c8c0a8" stroke="#a8a098" stroke-width="1"/>
  <!-- Spoke details -->
  <line x1="200" y1="126" x2="200" y2="170" stroke="#b0a890" stroke-width="1.5" opacity="0.5"/>
  <line x1="178" y1="148" x2="222" y2="148" stroke="#b0a890" stroke-width="1.5" opacity="0.5"/>
  <!-- LED dot indicators on outermost ring -->
  <circle cx="272" cy="148" r="2.5" fill="#ffee88"/>
  <circle cx="128" cy="148" r="2.5" fill="#ffee88"/>
  <circle cx="200" cy="76" r="2.5" fill="#ffee88"/>
  <circle cx="200" cy="220" r="2.5" fill="#ffee88"/>
  <text x="200" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">LED Strip — Warm White Reel 5m</text>
</svg>
