<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" width="400" height="300">
  <rect width="400" height="300" fill="#f0f2f5"/>
  <defs>
    <linearGradient id="clipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ecf0"/>
      <stop offset="50%" stop-color="#c8cdd4"/>
      <stop offset="100%" stop-color="#b0b6be"/>
    </linearGradient>
  </defs>

  <!-- Three connector/clip accessories arranged neatly -->

  <!-- Clip 1 — center -->
  <!-- Body -->
  <rect x="162" y="110" width="76" height="38" rx="5" fill="url(#clipGrad)" stroke="#9aa0aa" stroke-width="1.2"/>
  <!-- Clip jaw top -->
  <rect x="170" y="100" width="60" height="12" rx="3" fill="#d0d6de" stroke="#9aa0aa" stroke-width="1"/>
  <!-- Clip jaw bottom -->
  <rect x="170" y="146" width="60" height="12" rx="3" fill="#d0d6de" stroke="#9aa0aa" stroke-width="1"/>
  <!-- Spring tension indicator -->
  <line x1="200" y1="112" x2="200" y2="146" stroke="#b0b8c2" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- Screw holes -->
  <circle cx="178" cy="129" r="4" fill="#a8b0b8" stroke="#9098a2" stroke-width="1"/>
  <circle cx="222" cy="129" r="4" fill="#a8b0b8" stroke="#9098a2" stroke-width="1"/>
  <!-- Center slot -->
  <rect x="188" y="125" width="24" height="8" rx="2" fill="#b8c0c8"/>
  <!-- Highlight -->
  <rect x="164" y="111" width="72" height="3" rx="2" fill="#f0f4f8" opacity="0.7"/>

  <!-- Small connector plug left -->
  <rect x="96" y="122" width="44" height="16" rx="4" fill="#c8cdd4" stroke="#9aa0aa" stroke-width="1"/>
  <rect x="96" y="127" width="8" height="6" rx="1" fill="#a0a8b2"/>
  <rect x="108" y="127" width="8" height="6" rx="1" fill="#a0a8b2"/>
  <rect x="120" y="127" width="8" height="6" rx="1" fill="#a0a8b2"/>
  <rect x="132" y="127" width="8" height="6" rx="1" fill="#a0a8b2"/>
  <rect x="136" y="122" width="5" height="16" rx="2" fill="#b0b8c2" stroke="#9aa0aa" stroke-width="0.8"/>

  <!-- Small connector plug right -->
  <rect x="260" y="122" width="44" height="16" rx="4" fill="#c8cdd4" stroke="#9aa0aa" stroke-width="1"/>
  <rect x="260" y="127" width="8" height="6" rx="1" fill="#a0a8b2"/>
  <rect x="272" y="127" width="8" height="6" rx="1" fill="#a0a8b2"/>
  <rect x="284" y="127" width="8" height="6" rx="1" fill="#a0a8b2"/>
  <rect x="296" y="127" width="8" height="6" rx="1" fill="#a0a8b2"/>
  <rect x="259" y="122" width="5" height="16" rx="2" fill="#b0b8c2" stroke="#9aa0aa" stroke-width="0.8"/>

  <text x="200" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Lighting Connector &amp; Clip Accessories</text>
</svg>
