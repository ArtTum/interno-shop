<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f2f5"/>
  <!-- Subtle shadow -->
  <rect x="60" y="148" width="280" height="12" rx="4" fill="#d0d4da" opacity="0.5"/>
  <!-- C-profile bar body -->
  <rect x="60" y="128" width="280" height="20" rx="3" fill="#e8e8e8" stroke="#cccccc" stroke-width="1"/>
  <!-- Top flange -->
  <rect x="60" y="124" width="280" height="6" rx="2" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <!-- Bottom flange -->
  <rect x="60" y="148" width="280" height="6" rx="2" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <!-- Highlight on top edge -->
  <rect x="62" y="125" width="276" height="2" rx="1" fill="#ffffff" opacity="0.8"/>
  <!-- Inner channel shadow -->
  <rect x="64" y="132" width="272" height="12" rx="1" fill="#d8d8d8"/>
  <!-- End cap left -->
  <rect x="58" y="122" width="6" height="36" rx="2" fill="#dddddd" stroke="#cccccc" stroke-width="1"/>
  <!-- End cap right -->
  <rect x="336" y="122" width="6" height="36" rx="2" fill="#dddddd" stroke="#cccccc" stroke-width="1"/>
  <!-- Label -->
  <text x="200" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Stretch Ceiling Profile — White Aluminum</text>
</svg>
