<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" width="400" height="300">
  <rect width="400" height="300" fill="#f0f2f5"/>
  <defs>
    <linearGradient id="oakGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8903a"/>
      <stop offset="20%" stop-color="#d4a050"/>
      <stop offset="45%" stop-color="#c07828"/>
      <stop offset="70%" stop-color="#d09840"/>
      <stop offset="100%" stop-color="#b87030"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <rect x="82" y="84" width="240" height="142" rx="3" fill="#a08050" opacity="0.3"/>
  <!-- Wood panel -->
  <rect x="78" y="78" width="240" height="142" rx="3" fill="url(#oakGrad)"/>
  <!-- Wood grain lines -->
  <line x1="78" y1="92" x2="318" y2="89" stroke="#b06820" stroke-width="1.2" opacity="0.5"/>
  <line x1="78" y1="104" x2="318" y2="108" stroke="#a86018" stroke-width="0.8" opacity="0.4"/>
  <line x1="78" y1="118" x2="318" y2="115" stroke="#c07830" stroke-width="1.5" opacity="0.4"/>
  <line x1="78" y1="130" x2="318" y2="134" stroke="#b06820" stroke-width="0.7" opacity="0.3"/>
  <line x1="78" y1="144" x2="318" y2="140" stroke="#a86018" stroke-width="1.0" opacity="0.4"/>
  <line x1="78" y1="156" x2="318" y2="160" stroke="#c07830" stroke-width="1.3" opacity="0.3"/>
  <line x1="78" y1="170" x2="318" y2="167" stroke="#b06820" stroke-width="0.8" opacity="0.4"/>
  <line x1="78" y1="182" x2="318" y2="186" stroke="#a86018" stroke-width="1.1" opacity="0.3"/>
  <line x1="78" y1="196" x2="318" y2="193" stroke="#c07830" stroke-width="0.9" opacity="0.4"/>
  <!-- Knot detail -->
  <ellipse cx="155" cy="135" rx="10" ry="7" fill="none" stroke="#904010" stroke-width="1.2" opacity="0.5"/>
  <ellipse cx="155" cy="135" rx="5" ry="3" fill="#904010" opacity="0.3"/>
  <!-- Top gloss -->
  <rect x="78" y="78" width="240" height="4" rx="2" fill="#e8b870" opacity="0.5"/>
  <!-- Border -->
  <rect x="78" y="78" width="240" height="142" rx="3" fill="none" stroke="#a07030" stroke-width="1.5"/>
  <text x="200" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Wood Panel — Oak</text>
</svg>
